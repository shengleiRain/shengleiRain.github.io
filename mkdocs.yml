site_name: 小木个人笔记
site_description: '记录生活、技术，点点滴滴'
site_author: '小木'
docs_dir: docs/
#repo_name: 'shengleiRain/shengleiRain.io'
#repo_url: 'https://github.com/shengleiRain/shengleiRain.io'
edit_uri: ""

copyright: '&copy; 2020 小木'
theme:
  name: 'material'
  static_templates:
    - 404.html
  palette:
    primary: 'white'
    accent: 'blue'
  font:
    text: Roboto
    code: Roboto Mono
  language: 'zh'
  feature:
    tabs: true

plugins:
  - search

markdown_extensions:
  - admonition
  - codehilite:
      guess_lang: false
  - def_list
  - footnotes
  - meta
  - toc:
      permalink: true
  - pymdownx.arithmatex
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_javascript:
  - 'https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.0/MathJax.js?config=TeX-MML-AM_CHTML'

google_analytics:
  - 'UA-155096376-1'
  - 'auto'

nav:
    - Home: index.md

